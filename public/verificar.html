<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificando carnet — Vive I.P.S</title>
    <style>
      body { align-items: center; background: #f0f4f8; color: #1b3a6b; display: flex; font-family: Arial, sans-serif; justify-content: center; margin: 0; min-height: 100vh; padding: 24px; text-align: center; }
      .card { background: #fff; border-radius: 18px; box-shadow: 0 12px 40px rgba(27, 58, 107, .12); max-width: 460px; padding: 32px; width: 100%; }
      .loader { animation: spin 1s linear infinite; border: 4px solid #dbeafe; border-radius: 50%; border-top-color: #1baab5; height: 42px; margin: 0 auto 18px; width: 42px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #64748b; line-height: 1.5; margin: 0; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="loader"></div>
      <h1>Verificando carnet</h1>
      <p>Estamos validando la información del profesional.</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const cedula = params.get("cedula") || params.get("cc") || params.get("documento") || "";
      const esPruebas = window.location.hostname.includes("admin-pruebas") || window.location.hostname.includes("localhost") || window.location.hostname.includes("127.0.0.1");
      const apiBase = esPruebas ? "https://api-pruebas.viveips.com.co" : "https://api.viveips.com.co";

      if (!cedula) {
        document.querySelector(".loader").style.display = "none";
        document.querySelector("h1").textContent = "No fue posible verificar";
        document.querySelector("p").textContent = "El enlace no contiene una cédula válida para consultar.";
      } else {
        window.location.replace(`${apiBase}/carnet/verificar/${encodeURIComponent(cedula)}`);
      }
    </script>
  </body>
</html>
